```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧠 Math Challenge Kids</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.game-box{
    background:white;
    width:90%;
    max-width:420px;
    padding:25px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.2);
    z-index:10;
}

h1{
    margin-bottom:10px;
    color:#333;
}

.tagline{
    color:#666;
    font-size:14px;
    margin-bottom:20px;
}

#question{
    font-size:34px;
    font-weight:bold;
    margin:20px 0;
}

input{
    width:80%;
    padding:12px;
    font-size:18px;
    text-align:center;
    border:2px solid #4facfe;
    border-radius:10px;
}

button{
    width:85%;
    padding:12px;
    margin-top:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.submit-btn{
    background:#28a745;
    color:white;
}

.play-btn{
    background:#ff9800;
    color:white;
}

#result{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}

.score{
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:#777;
}

.bg{
    position:fixed;
    font-size:50px;
    opacity:0.4;
}
</style>
</head>

<body>

<!-- Background Decorations -->
<div class="bg" style="top:20px;left:20px;">🌈</div>
<div class="bg" style="top:20px;right:20px;">🎈</div>
<div class="bg" style="bottom:20px;left:20px;">🧸</div>
<div class="bg" style="bottom:20px;right:20px;">🚀</div>

<div class="bg" style="top:35%;left:5%;">⭐</div>
<div class="bg" style="top:55%;right:5%;">🧮</div>
<div class="bg" style="top:70%;left:12%;">➕</div>
<div class="bg" style="top:25%;right:12%;">🔢</div>

<div class="game-box">

    <h1>🧠 Math Challenge Kids</h1>

    <p class="tagline">
        🌈 Learn • Play • Win Stars • Become a Math Champion!
    </p>

    <div id="question"></div>

    <input
        type="number"
        id="answer"
        placeholder="Enter Answer">

    <br>

    <button class="submit-btn" onclick="checkAnswer()">
        ✅ Submit Answer
    </button>

    <button
        id="playAgainBtn"
        class="play-btn"
        onclick="restartGame()"
        style="display:none;">
        🔄 Play Again
    </button>

    <div id="result"></div>

    <div class="score">
        🏆 Score: <span id="score">0</span>
    </div>

    <div class="score">
        ⭐ Stars: <span id="stars">0</span>
    </div>

    <div class="footer">
        Made with ❤️ by Prem Kumar
    </div>

</div>

<script>

let score = 0;
let stars = 0;
let num1;
let num2;
let gameOver = false;

function newQuestion(){

    if(gameOver) return;

    num1 = Math.floor(Math.random()*20)+1;
    num2 = Math.floor(Math.random()*20)+1;

    document.getElementById("question").innerHTML =
        num1 + " + " + num2 + " = ?";
}

function checkAnswer(){

    if(gameOver) return;

    let answer =
        Number(document.getElementById("answer").value);

    let correctAnswer = num1 + num2;

    if(answer === correctAnswer){

        score++;
        stars++;

        document.getElementById("score").innerHTML = score;
        document.getElementById("stars").innerHTML = stars;

        const messages = [
            "🎉 Awesome!",
            "🌟 Great Job!",
            "🚀 Super Smart!",
            "🏆 Math Champion!",
            "⭐ Excellent!"
        ];

        let randomMessage =
            messages[Math.floor(Math.random()*messages.length)];

        document.getElementById("result").innerHTML =
            randomMessage;

        document.getElementById("answer").value = "";

        newQuestion();

    }else{

        gameOver = true;

        document.getElementById("result").innerHTML =
            "😊 Good Try! The answer was " + correctAnswer;

        document.getElementById("question").innerHTML =
            "🏁 Final Score: " + score;

        document.getElementById("answer").disabled = true;

        document.getElementById("playAgainBtn").style.display =
            "block";
    }
}

function restartGame(){

    score = 0;
    stars = 0;
    gameOver = false;

    document.getElementById("score").innerHTML = "0";
    document.getElementById("stars").innerHTML = "0";
    document.getElementById("result").innerHTML = "";
    document.getElementById("answer").value = "";
    document.getElementById("answer").disabled = false;

    document.getElementById("playAgainBtn").style.display =
        "none";

    newQuestion();
}

newQuestion();

</script>

</body>
</html>
