<!DOCTYPE html>
<html>
<head>
    <title>Math Challenge Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f5f5f5;
        }

        .game-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        #question {
            font-size: 28px;
            margin: 20px 0;
        }

        input {
            padding: 10px;
            font-size: 18px;
            width: 150px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
        }

        .submit-btn {
            background-color: #28a745;
            color: white;
        }

        .play-btn {
            background-color: #007bff;
            color: white;
        }

        #result {
            font-size: 20px;
            margin-top: 15px;
            font-weight: bold;
        }

        #score {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="game-box">

    <h1>🎮 Math Challenge</h1>

    <p id="question"></p>

    <input type="number" id="answer" placeholder="Your Answer">

    <br>

    <button class="submit-btn" onclick="checkAnswer()">
        Submit
    </button>

    <button id="playAgainBtn"
            class="play-btn"
            onclick="restartGame()"
            style="display:none;">
        🔄 Play Again
    </button>

    <p id="result"></p>

    <p>
        🏆 Score:
        <span id="score">0</span>
    </p>

</div>

<script>

let score = 0;
let num1, num2;
let gameOver = false;

function newQuestion() {

    if (gameOver) return;

    num1 = Math.floor(Math.random() * 20) + 1;
    num2 = Math.floor(Math.random() * 20) + 1;

    document.getElementById("question").innerHTML =
        num1 + " + " + num2 + " = ?";
}

function checkAnswer() {

    if (gameOver) return;

    let answer =
        Number(document.getElementById("answer").value);

    let correctAnswer = num1 + num2;

    if (answer === correctAnswer) {

        score++;

        document.getElementById("result").innerHTML =
            "✅ Correct!";

        document.getElementById("score").innerHTML = score;

        document.getElementById("answer").value = "";

        newQuestion();

    } else {

        gameOver = true;

        document.getElementById("result").innerHTML =
            "❌ Game Over! Correct Answer: " + correctAnswer;

        document.getElementById("question").innerHTML =
            "🏁 Final Score: " + score;

        document.getElementById("answer").disabled = true;

        document.getElementById("playAgainBtn").style.display =
            "inline-block";
    }
}

function restartGame() {

    score = 0;
    gameOver = false;

    document.getElementById("score").innerHTML = "0";
    document.getElementById("result").innerHTML = "";
    document.getElementById("answer").value = "";
    document.getElementById("answer").disabled = false;

    document.getElementById("playAgainBtn").style.display =
        "none";

    newQuestion();
}

newQuestion();

</script>

</body>
</html>
