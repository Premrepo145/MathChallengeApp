<!DOCTYPE html>
<html>
<head>
    <title>🧠 Math Challenge Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-box {
            background: rgba(255,255,255,0.95);
            width: 90%;
            max-width: 450px;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .tagline {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        #question {
            font-size: 32px;
            font-weight: bold;
            margin: 20px 0;
        }

        input {
            width: 80%;
            padding: 12px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #667eea;
            border-radius: 10px;
        }

        button {
            padding: 12px 20px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .submit-btn {
            background: #28a745;
            color: white;
        }

        .play-btn {
            background: #ff9800;
            color: white;
        }

        #result {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        .score-box {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #764ba2;
        }
    </style>
</head>
<body>

<div class="game-box">

    <h1>🎮 Math Challenge</h1>

    <p id="question"></p>

    <input type="number" id="answer" placeholder="Your Answer">

    <br>

    <button class="submit-btn" onclick="checkAnswer()">
        Submit
    </button>

    <button id="playAgainBtn"
            class="play-btn"
            onclick="restartGame()"
            style="display:none;">
        🔄 Play Again
    </button>

    <p id="result"></p>

    <p>
        🏆 Score:
        <span id="score">0</span>
    </p>

</div>

<script>

let score = 0;
let num1, num2;
let gameOver = false;

function newQuestion() {

    if (gameOver) return;

    num1 = Math.floor(Math.random() * 20) + 1;
    num2 = Math.floor(Math.random() * 20) + 1;

    document.getElementById("question").innerHTML =
        num1 + " + " + num2 + " = ?";
}

function checkAnswer() {

    if (gameOver) return;

    let answer =
        Number(document.getElementById("answer").value);

    let correctAnswer = num1 + num2;

    if (answer === correctAnswer) {

        score++;

        document.getElementById("result").innerHTML =
            "✅ Correct!";

        document.getElementById("score").innerHTML = score;

        document.getElementById("answer").value = "";

        newQuestion();

    } else {

        gameOver = true;

        document.getElementById("result").innerHTML =
            "❌ Game Over! Correct Answer: " + correctAnswer;

        document.getElementById("question").innerHTML =
            "🏁 Final Score: " + score;

        document.getElementById("answer").disabled = true;

        document.getElementById("playAgainBtn").style.display =
            "inline-block";
    }
}

function restartGame() {

    score = 0;
    gameOver = false;

    document.getElementById("score").innerHTML = "0";
    document.getElementById("result").innerHTML = "";
    document.getElementById("answer").value = "";
    document.getElementById("answer").disabled = false;

    document.getElementById("playAgainBtn").style.display =
        "none";

    newQuestion();
}

newQuestion();

</script>

</body>
</html>
